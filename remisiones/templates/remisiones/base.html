<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRUE Remisiones{% endblock %}</title>

    {% load static %}

    <!-- Bootstrap 5 CSS (CDN) -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- CSS propio de la aplicación -->
    <link rel="stylesheet" href="{% static 'remisiones/css/main.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>

		<div class="title-bar-top d-flex align-items-center justify-content-between">
		  <!-- LEFT: Logo -->
		  <div class="d-flex align-items-center" style="width:200px">
			<img src="{% static 'remisiones/img/logos/logo_hudn-horizontal.png' %}"
				 alt="Logo HUDN"
				 style="width:100%;">
		  </div>

		  <!-- CENTER: Title -->
		  <div class="text-center flex-grow-1">
			<h1 class="title-bar-heading m-0">
			  REMISIONES DE USUARIOS COMENTADOS POR CRUE, ESE, SAS, EPS
			</h1>
		  </div>

		  <!-- RIGHT: Date + User -->
		  <div class="text-end " style="width:200px">
			<div>{{ fecha_hoy }}</div>
			<div>
			  <i class="bi bi-person me-1"></i>
			  {{ request.user.get_full_name }}
			</div>
		  </div>
		</div>

    {% block content %}{% endblock %}

    <!-- Bootstrap 5 JS Bundle (incluye Popper) -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
