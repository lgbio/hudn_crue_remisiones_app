	<!-- BARRA DE TÍTULO Y CONTROLES DE FILTRO -->
	<header class="title-bar">

	  <form id="form-filtros" method="get" action="{% url 'crueremisiones:main' %}" class="filtros-form">
		<input type="hidden" name="orden" id="input-orden" value="{{ orden }}">

		<!-- Row 1: Por mes -->
		<div class="filtros-row">
		  <span class="filtros-label">Ver registros:</span>

		  <label class="filtro-radio-label">
			<input type="radio" name="filtro" value="mes"
				   {% if filtro == 'mes' %}checked{% endif %}
				   class="filtro-radio" id="radio-mes">
			Por mes
		  </label>

		  <select name="mes" id="select-mes" class="form-select form-select-sm filtro-select filtro-inline-mes">
			{% for num, nombre in meses %}
			<option value="{{ num }}"
					{% if num == mes_actual %}selected{% endif %}
					{% if anio_actual == anio_hoy and num > mes_hoy %}disabled{% endif %}>
			  {{ nombre }}
			</option>
			{% endfor %}
		  </select>
		  <input type="number" name="anio" value="{{ anio_actual }}"
				 id="input-anio"
				 class="form-control form-control-sm filtro-anio"
				 min="2000" max="{{ anio_hoy }}" step="1">

		  <button type="submit" class="btn btn-primary btn-sm">
			<i class="bi bi-search me-1"></i>Buscar
		  </button>
		</div>

		<!-- Row 2: Por documento o nombre + Paginado + Orden + Nuevo Registro -->
		<div class="filtros-row">
		  <span class="filtros-label" style="visibility:hidden;">Ver registros:</span>

		  <label class="filtro-radio-label">
			<input type="radio" name="filtro" value="documento"
				   {% if filtro == 'documento' %}checked{% endif %}
				   class="filtro-radio" id="radio-documento">
			Por documento o nombre
		  </label>

		  <input type="text" name="doc" value="{{ doc }}"
				 class="form-control form-control-sm filtro-doc-nombre"
				 placeholder="Número de documento o nombre del paciente" id="input-doc">

		  <button type="submit" class="btn btn-primary btn-sm">
			<i class="bi bi-search me-1"></i>Buscar
		  </button>

		  <!-- Right side: Paginado + Orden + Nuevo Registro -->
		  <div class="d-flex align-items-center ms-auto gap-2">
			<label class="filtro-check-label">
			  <input type="checkbox" name="paginado" value="True"
					 {% if paginado %}checked{% endif %}
					 class="form-check-input me-1" id="check-paginado">
			  Paginado
			</label>

			<button type="button" id="btn-orden"
					class="btn btn-outline-secondary btn-sm"
					title="{% if orden == 'desc' %}Más recientes primero{% else %}Más antiguos primero{% endif %}">
			  <i class="bi {% if orden == 'desc' %}bi-sort-down{% else %}bi-sort-up{% endif %} me-1"></i>
			  <span id="orden-label">{% if orden == 'desc' %}Recientes{% else %}Antiguos{% endif %}</span>
			</button>

			<button type="button" id="btn-nuevo-registro"
					class="btn btn-success btn-sm">
			  <i class="bi bi-plus-circle me-1"></i>Nuevo Registro
			</button>
		  </div>
		</div>

		<!-- Mensajes de validación de filtros -->
		<div id="filtro-error" class="text-danger small mt-1"></div>

	  </form>
	</header>
	<!-- /title-bar -->
