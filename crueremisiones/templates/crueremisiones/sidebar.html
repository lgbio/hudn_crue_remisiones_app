  <!-- SIDEBAR — panel lateral colapsable -->
  <aside id="sidebar" class="sidebar">

    <!-- Toggle para colapsar/expandir -->
    <button id="sidebar-toggle" class="sidebar-toggle" title="Colapsar menú" aria-label="Colapsar menú">
      <i class="bi bi-layout-sidebar-reverse"></i>
    </button>

    <hr class="sidebar-divider">

    <!-- --- Sección 1: Información del usuario --- -->
    <section class="sidebar-section user-info-section">
      <div class="sidebar-label sidebar-section-title">
        <i class="bi bi-person-circle me-1"></i>
        <span class="sidebar-text">Usuario</span>
      </div>
      <div class="sidebar-label sidebar-user-detail">
        <span class="sidebar-text">{{ request.user.username }}</span>
      </div>
      <div class="sidebar-label sidebar-user-detail small">
        <i class="bi bi-calendar3 me-1"></i>
        <span class="sidebar-text">{{ fecha_hoy }}</span>
      </div>
    </section>

    <hr class="sidebar-divider">

    <!-- --- Sección 2: Reportes (collapsible) --- -->
    <section class="sidebar-section">
      <button class="sidebar-menu-toggle" data-target="menu-reportes" aria-expanded="false">
        <span class="sidebar-menu-toggle-label">
          <i class="bi bi-bar-chart-line me-1 icon-reportes"></i>
          <span class="sidebar-text">Reportes</span>
        </span>
        <i class="bi bi-chevron-down sidebar-text sidebar-chevron"></i>
      </button>
      <ul id="menu-reportes" class="sidebar-menu-list sidebar-collapsible collapsed">
        <li>
          <a href="{% url 'crueremisiones:exportar_excel' %}?filtro={{ filtro }}&mes={{ mes_actual }}&anio={{ anio_actual }}&desde={{ desde }}&hasta={{ hasta }}&doc={{ doc }}"
             class="sidebar-sub-item" id="btn-exportar-excel">
            <i class="bi bi-file-earmark-excel me-1 icon-excel"></i>
            <span class="sidebar-text">Excel</span>
          </a>
        </li>
      </ul>
    </section>

    <!-- --- Sección 3: Gestión (collapsible) --- -->
    <section class="sidebar-section">
      <button class="sidebar-menu-toggle" data-target="menu-gestion" aria-expanded="false">
        <span class="sidebar-menu-toggle-label">
          <i class="bi bi-gear me-1 icon-gestion"></i>
          <span class="sidebar-text">Gestión</span>
        </span>
        <i class="bi bi-chevron-down sidebar-text sidebar-chevron"></i>
      </button>
      <ul id="menu-gestion" class="sidebar-menu-list sidebar-collapsible collapsed">
        <li>
          <a href="{% url 'crueremisiones:cambiar_password' %}" class="sidebar-sub-item">
            <i class="bi bi-key-fill me-1 icon-key"></i>
            <span class="sidebar-text">Contraseña</span>
          </a>
        </li>
        {% if request.user.rol == 'DIRECTOR' %}
        <li>
          <a href="{% url 'crueremisiones:usuarios' %}" class="sidebar-sub-item">
            <i class="bi bi-people-fill me-1 icon-users"></i>
            <span class="sidebar-text">Usuarios</span>
          </a>
        </li>
        {% endif %}
      </ul>
    </section>

    <!-- --- Sección 4: Importar (collapsible) --- -->
    <section class="sidebar-section">
      <button class="sidebar-menu-toggle" data-target="menu-importar" aria-expanded="false">
        <span class="sidebar-menu-toggle-label">
          <i class="bi bi-upload me-1 icon-importar"></i>
          <span class="sidebar-text">Importar</span>
        </span>
        <i class="bi bi-chevron-down sidebar-text sidebar-chevron"></i>
      </button>
      <div id="menu-importar" class="sidebar-collapsible collapsed">
        <form id="form-importar" method="post" action="{% url 'crueremisiones:importar_excel' %}" enctype="multipart/form-data" class="sidebar-sub-content">
          {% csrf_token %}
          <div class="sidebar-text">
            <input type="file" name="archivo" id="id_archivo_importar"
                   class="form-control form-control-sm mb-1"
                   accept=".xlsx,.xls">
            <button type="submit" class="btn btn-outline-primary btn-sm w-100">
              <i class="bi bi-cloud-upload me-1"></i>Importar Excel
            </button>
          </div>
        </form>
        <div id="importar-resultado" class="mt-1 small sidebar-text sidebar-sub-content"></div>
      </div>
    </section>

    <!-- Spacer to push Salir to bottom -->
    <div class="sidebar-spacer"></div>

    <!-- --- Sección 5: Salir (fijado al fondo) --- -->
    <div class="sidebar-section sidebar-salir-section">
      <hr class="sidebar-divider">
      <form method="post" action="{% url 'crueremisiones:logout' %}">
        {% csrf_token %}
        <button type="submit" class="sidebar-menu-item sidebar-btn-salir w-100">
          <i class="bi bi-box-arrow-right me-1 icon-salir"></i>
          <span class="sidebar-text">Salir</span>
        </button>
      </form>
    </div>

  </aside>
  <!-- /sidebar -->
